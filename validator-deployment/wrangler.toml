name = "synthos-validator"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare R2 Bucket Configuration
[[r2_buckets]]
binding = "VALIDATOR_BUCKET"
bucket_name = "synthos-validators"
jurisdiction = "eu"

# Environment Variables (per validator)
[env.validator1]
vars = { VALIDATOR_ID = "validator-1", PRIVATE_KEY = "paste_your_key_here", NETWORK = "mainnet" }

